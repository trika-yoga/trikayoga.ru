    <div id="app"><div class="page no-eng" data-v-4c8b317c><div class="header" data-v-4c8b317c><header data-v-4c8b317c data-v-8ca7e3d0><a class="no-underline mt-4 mb-4 text-center" href="/" data-v-8ca7e3d0><img class="w-12rem mb-8" src="/img/sadvidya.svg" data-v-8ca7e3d0><div class="text-3xl font-bold" data-v-8ca7e3d0>Трика йога</div></a></header><div class="flex flex-wrap items-center justify-center" data-v-4c8b317c data-v-d1e4648c><!--[--><a href="/mantra/" class="p-2 no-underline transition-all duration-300" data-v-2f665b2c>Мантры</a><a href="/yantra/" class="active p-2 no-underline transition-all duration-300" data-v-2f665b2c>Янтры</a><a href="/texts/" class="p-2 no-underline transition-all duration-300" data-v-2f665b2c>Писания</a><a href="/hymns/" class="p-2 no-underline transition-all duration-300" data-v-2f665b2c>Гимны</a><a href="/songs/" class="p-2 no-underline transition-all duration-300" data-v-2f665b2c>Бхаджаны</a><a href="/schemes/" class="p-2 no-underline transition-all duration-300" data-v-2f665b2c>Таблицы и схемы</a><a href="/sources/" class="p-2 no-underline transition-all duration-300" data-v-2f665b2c>Источники</a><!--]--></div></div><div class="content" data-v-4c8b317c><header class="mb-8" data-v-4c8b317c><div class="inline-flex flex-wrap justify-start items-stretch" data-v-4c8b317c data-v-4776fab3><!--[--><a class="link" href="/yantra/" data-v-4776fab3><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1.2em" height="1.2em" preserveaspectratio="xMidYMid meet" viewbox="0 0 32 32" style="vertical-align:middle;" class="mr-1" data-v-4776fab3><path d="M22 16L12 26l-1.4-1.4l8.6-8.6l-8.6-8.6L12 6z" fill="currentColor"></path></svg><span data-v-4776fab3>Янтры</span></a><!--]--></div><h1 class="text-4xl font-bold mb-8 text-center" data-v-4c8b317c>Шива сутра</h1><div class="max-w-xl mx-auto sans font-bold mb-4 text-center" data-v-4c8b317c>शिवसूत्रा</div><div class="max-w-xl mx-auto text-2xl mb-4 text-center" data-v-4c8b317c>śivasūtrā</div><div class="max-w-xl mx-auto text-xl text-center" data-v-4c8b317c>Великое писание в одном треугольнике для созерцания</div></header><div style="position:relative;" data-v-4c8b317c><div><svg version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewbox="0 0 1000 1050" xml:space="preserve" id="shiva-sutra-sans" data-v-5ef6881e><polygon points="10,1020 500,0 990,1020" fill="#F6E3B7" data-v-5ef6881e></polygon><text x="500" y="80" font-family="Mukta, sans-serif" font-size="18px" text-anchor="middle" dominant-baseline="middle" data-v-5ef6881e><tspan x="50%" dy="-15" font-size="32px" font-weight="bold" data-v-5ef6881e>ॐ</tspan><tspan x="50%" dy="39" font-weight="bold" font-size="22px" data-v-5ef6881e>शिवसूत्रा</tspan><tspan x="50%" dy="34" font-weight="bold" fill="gray" data-v-5ef6881e>शाम्भवोपाय</tspan><tspan x="50%" dy="24" data-v-5ef6881e> चैतन्यमात्मा ॥१॥</tspan><tspan x="50%" dy="24" data-v-5ef6881e> ज्ञानं बन्धः ॥२॥</tspan><tspan x="50%" dy="24" data-v-5ef6881e> योनिवर्गः कलाशरीरम् ॥३॥</tspan><tspan x="50%" dy="24" data-v-5ef6881e>ज्ञानाधिष्ठानं मातृका ॥४॥</tspan><tspan x="50%" dy="24" data-v-5ef6881e>उद्यमो भैरवः ॥५॥</tspan><tspan x="50%" dy="24" data-v-5ef6881e>शक्तिचक्रसन्धाने विश्वसंहारः ॥६॥</tspan><tspan x="50%" dy="24" data-v-5ef6881e>जाग्रत्स्वप्नसुषुप्तभेदे तुर्याभोगसम्भवः ॥७॥</tspan><tspan x="50%" dy="24" data-v-5ef6881e>ज्ञानं जाग्रत् ॥८॥ स्वप्नो विकल्पाः ॥९॥</tspan><tspan x="50%" dy="24" data-v-5ef6881e>अविवेको मायासौषुप्तम् ॥१०॥ </tspan><tspan x="50%" dy="24" data-v-5ef6881e>त्रितयभोक्ता वीरेशः ॥११॥ विस्मयो योगभूमिकाः ॥१२॥</tspan><tspan x="50%" dy="24" data-v-5ef6881e> इच्छाशक्तिरुमा कुमारी ॥१३॥ दृश्यं शरीरम् ॥१४॥</tspan><tspan x="50%" dy="24" data-v-5ef6881e>हृदये चित्तसङ्घट्टाद्दृश्यस्वापदर्शनम् ॥१५॥</tspan><tspan x="50%" dy="24" data-v-5ef6881e> शुद्धतत्त्वसन्धानाद्वापशुशक्तिः ॥१६॥ वितर्क आत्मज्ञानम् ॥१७॥ </tspan><tspan x="50%" dy="24" data-v-5ef6881e>लोकानन्दः समाधिसुखम् ॥१८॥ शक्तिसन्धाने शरीरोत्पत्तिः ॥१९॥ </tspan><tspan x="50%" dy="24" data-v-5ef6881e>भूतसन्धानभूतपृथक्त्वविश्वसङ्घट्टाः ॥२०॥</tspan><tspan x="50%" dy="24" data-v-5ef6881e> शुद्धविद्योदयाच्चक्रेशत्वसिद्धिः ॥२१॥ महाह्रदानुसन्धानान्मन्त्रवीर्यानुभवः ॥२२॥</tspan><tspan x="50%" dy="34" font-weight="bold" fill="gray" data-v-5ef6881e>शाक्तोपाय</tspan><tspan x="50%" dy="24" data-v-5ef6881e> चित्तं मन्त्रः ॥१॥ प्रयत्नः साधकः ॥२॥ विद्याशरीरसत्ता मन्त्ररहस्यम् ॥३॥</tspan><tspan x="50%" dy="24" data-v-5ef6881e>गर्भे चित्तविकासोऽविशिष्टविद्यास्वप्नः ॥४॥ विद्यासमुत्थाने स्वाभाविके खेचरी शिवावस्था ॥५॥</tspan><tspan x="50%" dy="24" data-v-5ef6881e>गुरुरुपायः ॥६॥ मातृकाचक्रसम्बोधः ॥७॥ शरीरं हविः ॥८॥ ज्ञानमन्नम् ॥९॥ </tspan><tspan x="50%" dy="24" data-v-5ef6881e> विद्यासंहारे तदुत्थस्वप्नदर्शनम् ॥१०॥</tspan><tspan x="50%" dy="24" data-v-5ef6881e></tspan><tspan x="50%" dy="34" font-weight="bold" fill="gray" data-v-5ef6881e> आणवोपाय</tspan><tspan x="500" dy="24" data-v-5ef6881e> आत्मा चित्तम् ॥१॥ ज्ञानं बन्धः ॥२॥ कलादीनां तत्त्वानामविवेको माया ॥३॥ शरीरे संहारः कलानाम् ॥४॥ </tspan><tspan x="50%" dy="24" data-v-5ef6881e>डीसंहारभूतजयभूतकैवल्यभूतपृथक्त्वानि ॥५॥ मोहावरणात्सिद्धिः ॥६॥ मोहजयादनन्ताभोगात्सहजविद्याजयः ॥७॥ </tspan><tspan x="50%" dy="24" data-v-5ef6881e> जाग्रद्द्वितीयकरः ॥८॥ नर्तक आत्मा ॥९॥ रङ्गोऽन्तरात्मा ॥१०॥ प्रेक्षकाणीन्द्रियाणि ॥११॥</tspan><tspan x="50%" dy="24" data-v-5ef6881e> धीवशात्सत्त्वसिद्धिः ॥१२॥ सिद्धः स्वतन्त्रभावः ॥१३॥ यथा तत्र तथान्यत्र ॥१४॥ बीजावधानम् ॥१५॥</tspan><tspan x="50%" dy="24" data-v-5ef6881e>आसनस्थः सुखं ह्रदे निमज्जति ॥१६॥ स्वमात्रानिर्माणमापादयति ॥१७॥ विद्याविनाशे जन्मविनाशः ॥१८॥ </tspan><tspan x="50%" dy="24" data-v-5ef6881e> कवर्गादिषु माहेश्वर्याद्याः पशुमातरः ॥१९॥ त्रिषु चतुर्थं तैलवदासेच्यम् ॥२०॥ मग्नः स्वचित्तेन प्रविशेत् ॥२१॥</tspan><tspan x="50%" dy="24" data-v-5ef6881e> प्राणसमाचारे समदर्शनम् ॥२२॥ मध्येऽवरप्रसवः ॥२३॥ मात्रास्वप्रत्ययसन्धाने नष्टस्य पुनरुत्थानम् ॥२४॥ शिवतुल्यो जायते ॥२५॥</tspan><tspan x="50%" dy="24" data-v-5ef6881e>शरीरवृत्तिर्व्रतम् ॥२६॥ कथा जपः ॥२७॥ दानमात्मज्ञानम् ॥२८॥ योऽविपस्थो ज्ञाहेतुश्च ॥२९॥ स्वशक्तिप्रचयोऽस्य विश्वम् ॥३०॥</tspan><tspan x="50%" dy="24" data-v-5ef6881e>स्थितिलयौ ॥३१॥ तत्प्रवृत्तावप्यनिरासः संवेत्तृभावात् ॥३२॥ सुखदुःखयोर्बहिर्मननम् ॥३३॥ तद्विमुक्तस्तु केवली ॥३४॥ </tspan><tspan x="50%" dy="24" data-v-5ef6881e>मोहप्रतिसंहतस्तु कर्मात्मा ॥३५॥ भेदतिरस्कारे सर्गान्तरकर्मत्वम् ॥३६॥ करणशक्तिः स्वतोऽनुभवात् ॥३७॥ त्रिपदाद्यनुप्राणनम् ॥३८॥</tspan><tspan x="50%" dy="24" data-v-5ef6881e>चित्तस्थितिवच्छरीरकरणबाह्येषु ॥३९॥ अभिलाषाद्बहिर्गतिः संवाह्यस्य ॥४०॥ तदारूढप्रमितेस्तत्क्षयाज्जीवसङ्क्षयः ॥४१॥</tspan><tspan x="50%" dy="24" data-v-5ef6881e>भूतकञ्चुकी तदा विमुक्तो भूयः पतिसमः परः ॥४२॥ नैसर्गिकः प्राणसम्बन्धः ॥४३॥ नासिकान्तर्मध्यसंयमात् किमत्र सव्यापसव्यसौषुम्नेषु ॥४४॥</tspan><tspan x="50%" dy="24" data-v-5ef6881e>भूयः स्यात्प्रतिमीलनम् ॥४५॥</tspan></text></svg><div class="snapshot" data-v-ffec7b68><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1.2em" height="1.2em" preserveaspectratio="xMidYMid meet" viewbox="0 0 32 32" style="vertical-align:middle;" data-v-ffec7b68><path d="M11.5 6l-.313.406L10 8H3v18h26V8h-7l-1.188-1.594L20.5 6zm1 2h7l1.188 1.594L21 10h6v14H5V10h6l.313-.406zM8 11c-.55 0-1 .45-1 1s.45 1 1 1s1-.45 1-1s-.45-1-1-1zm8 0c-3.3 0-6 2.7-6 6s2.7 6 6 6s6-2.7 6-6s-2.7-6-6-6zm0 2c2.223 0 4 1.777 4 4s-1.777 4-4 4s-4-1.777-4-4s1.777-4 4-4z" fill="currentColor"></path></svg><!----></div><svg version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewbox="0 0 1000 1200" xml:space="preserve" id="shiva-sutra-trans" data-v-1a0f763f><polygon points="0,1140 500,0 1000,1140" fill="#F6E3B7" data-v-1a0f763f></polygon><text class="lowercase" x="500" y="80" font-family="Commissioner, sans-serif" font-size="14px" text-anchor="middle" dominant-baseline="middle" data-v-1a0f763f><tspan x="50%" dy="0" font-size="32px" font-weight="bold" data-v-1a0f763f>ॐ</tspan><tspan x="50%" dy="59" font-weight="bold" font-size="18px" data-v-1a0f763f>Śivasūtrā</tspan><tspan x="50%" dy="34" font-weight="bold" fill="gray" data-v-1a0f763f>Śāmbhavopāya</tspan><tspan x="50%" dy="24" data-v-1a0f763f>Caitanyamātmā ॥1॥</tspan><tspan x="50%" dy="24" data-v-1a0f763f>Jñānaṁ bandhaḥ ॥2॥</tspan><tspan x="50%" dy="24" data-v-1a0f763f>Yonivargaḥ kalāśarīram ॥3॥</tspan><tspan x="50%" dy="24" data-v-1a0f763f>Jñānādhiṣṭhānaṁ mātṛkā ॥4॥</tspan><tspan x="50%" dy="24" data-v-1a0f763f>Udyamo bhairavaḥ ॥5॥</tspan><tspan x="50%" dy="24" data-v-1a0f763f>Śakticakrasandhāne viśvasaṁhāraḥ ॥6॥</tspan><tspan x="50%" dy="24" data-v-1a0f763f>Jāgratsvapnasuṣuptabhede </tspan><tspan x="50%" dy="24" data-v-1a0f763f>turyābhogasambhavaḥ ॥7॥</tspan><tspan x="50%" dy="24" data-v-1a0f763f>Jñānaṁ jāgrat ॥8॥ Svapno vikalpāḥ ॥9॥</tspan><tspan x="50%" dy="24" data-v-1a0f763f>Aviveko māyāsauṣuptam ॥10॥</tspan><tspan x="50%" dy="24" data-v-1a0f763f>Tritayabhoktā vīreśaḥ ॥11॥ Vismayo yogabhūmikāḥ ॥12॥</tspan><tspan x="50%" dy="24" data-v-1a0f763f> Icchāśaktirumā kumārī ॥13॥ Dṛśyaṁ śarīram ॥14॥</tspan><tspan x="50%" dy="24" data-v-1a0f763f>Hṛdaye cittasaṅghaṭṭāddṛśyasvāpadarśanam ॥15॥</tspan><tspan x="50%" dy="24" data-v-1a0f763f> Śuddhatattvasandhānādvāpaśuśaktiḥ ॥16॥ </tspan><tspan x="50%" dy="24" data-v-1a0f763f>Vitarka ātmajñānam ॥17॥ Lokānandaḥ samādhisukham ॥18॥</tspan><tspan x="50%" dy="24" data-v-1a0f763f> Śaktisandhāne śarīrotpattiḥ ॥19॥ </tspan><tspan x="50%" dy="24" data-v-1a0f763f>Bhūtasandhānabhūtapṛthaktvaviśvasaṅghaṭṭāḥ ॥20॥</tspan><tspan x="50%" dy="24" data-v-1a0f763f> Śuddhavidyodayāccakreśatvasiddhiḥ ॥21॥ </tspan><tspan x="50%" dy="24" data-v-1a0f763f> Mahāhradānusandhānānmantravīryānubhavaḥ ॥22॥</tspan><tspan x="50%" dy="34" font-weight="bold" fill="gray" data-v-1a0f763f>Śāktopāya</tspan><tspan x="50%" dy="24" data-v-1a0f763f> Cittaṁ mantraḥ ॥1॥ Prayatnaḥ sādhakaḥ ॥2॥ Vidyāśarīrasattā mantrarahasyam ॥3॥</tspan><tspan x="50%" dy="24" data-v-1a0f763f>Garbhe cittavikāso&#39;viśiṣṭavidyāsvapnaḥ ॥4॥ </tspan><tspan x="50%" dy="24" data-v-1a0f763f>Vidyāsamutthāne svābhāvike khecarī śivāvasthā ॥5॥ Gururupāyaḥ ॥6॥ Mātṛkācakrasambodhaḥ ॥7॥ </tspan><tspan x="50%" dy="24" data-v-1a0f763f>Śarīraṁ haviḥ ॥8॥ Jñānamannam ॥9॥ Vidyāsaṁhāre tadutthasvapnadarśanam ॥10॥</tspan><tspan x="50%" dy="24" data-v-1a0f763f></tspan><tspan x="50%" dy="34" font-weight="bold" fill="gray" data-v-1a0f763f> Āṇavopāya</tspan><tspan x="500" dy="24" data-v-1a0f763f> Ātmā cittam ॥1॥ Jñānaṁ bandhaḥ ॥2॥ Kalādīnāṁ tattvānāmaviveko māyā ॥3॥ Śarīre saṁhāraḥ kalānām ॥4॥</tspan><tspan x="50%" dy="24" data-v-1a0f763f>Nāḍīsaṁhārabhūtajayabhūtakaivalyabhūtapṛthaktvāni ॥5॥ Mohāvaraṇātsiddhiḥ ॥6॥</tspan><tspan x="50%" dy="24" data-v-1a0f763f>Mohajayādanantābhogātsahajavidyājayaḥ ॥7॥ Jāgraddvitīyakaraḥ ॥8॥ Nartaka ātmā ॥9॥ Raṅgo&#39;ntarātmā ॥10॥ </tspan><tspan x="50%" dy="24" data-v-1a0f763f>Prekṣakāṇīndriyāṇi ॥11॥ Dhīvaśātsattvasiddhiḥ ॥12॥ Siddhaḥ svatantrabhāvaḥ ॥13॥ Yathā tatra tathānyatra ॥14॥ </tspan><tspan x="50%" dy="24" data-v-1a0f763f>Bījāvadhānam ॥15॥ Āsanasthaḥ sukhaṁ hrade nimajjati ॥16॥ Svamātrānirmāṇamāpādayati ॥17॥ Vidyāvināśe janmavināśaḥ ॥18॥ </tspan><tspan x="50%" dy="24" data-v-1a0f763f> Kavargādiṣu māheśvaryādyāḥ paśumātaraḥ ॥19॥ Triṣu caturthaṁ tailavadāsecyam ॥20॥ Magnaḥ svacittena praviśet ॥21॥</tspan><tspan x="50%" dy="24" data-v-1a0f763f> Prāṇasamācāre samadarśanam ॥22॥ Madhye&#39;varaprasavaḥ ॥23॥ Mātrāsvapratyayasandhāne naṣṭasya punarutthānam ॥24॥</tspan><tspan x="50%" dy="24" data-v-1a0f763f>Śivatulyo jāyate ॥25॥ Śarīravṛttirvratam ॥26॥ Kathā japaḥ ॥27॥ Dānamātmajñānam ॥28॥ Yo&#39;vipastho jñāhetuśca ॥29॥ </tspan><tspan x="50%" dy="24" data-v-1a0f763f>Svaśaktipracayo&#39;sya viśvam ॥30॥ Sthitilayau ॥31॥ Tatpravṛttāvapyanirāsaḥ saṁvettṛbhāvāt ॥32॥ Sukhaduḥkhayorbahirmananam ॥33॥ </tspan><tspan x="50%" dy="24" data-v-1a0f763f>Tadvimuktastu kevalī ॥34॥ Mohapratisaṁhatastu karmātmā ॥35॥ Bhedatiraskāre sargāntarakarmatvam ॥36॥ </tspan><tspan x="50%" dy="24" data-v-1a0f763f>Karaṇaśaktiḥ svato&#39;nubhavāt ॥37॥ Tripadādyanuprāṇanam ॥38॥ Cittasthitivaccharīrakaraṇabāhyeṣu ॥39॥ </tspan><tspan x="50%" dy="24" data-v-1a0f763f>Abhilāṣādbahirgatiḥ saṁvāhyasya ॥40॥ Tadārūḍhapramitestatkṣayājjīvasaṅkṣayaḥ ॥41॥ Bhūtakañcukī tadā vimukto bhūyaḥ patisamaḥ paraḥ ॥42॥</tspan><tspan x="50%" dy="24" data-v-1a0f763f>Naisargikaḥ prāṇasambandhaḥ ॥43॥ Nāsikāntarmadhyasaṁyamāt kimatra savyāpasavyasauṣumneṣu ॥44॥ Bhūyaḥ syātpratimīlanam ॥45॥</tspan></text></svg><div class="snapshot" data-v-ffec7b68><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1.2em" height="1.2em" preserveaspectratio="xMidYMid meet" viewbox="0 0 32 32" style="vertical-align:middle;" data-v-ffec7b68><path d="M11.5 6l-.313.406L10 8H3v18h26V8h-7l-1.188-1.594L20.5 6zm1 2h7l1.188 1.594L21 10h6v14H5V10h6l.313-.406zM8 11c-.55 0-1 .45-1 1s.45 1 1 1s1-.45 1-1s-.45-1-1-1zm8 0c-3.3 0-6 2.7-6 6s2.7 6 6 6s6-2.7 6-6s-2.7-6-6-6zm0 2c2.223 0 4 1.777 4 4s-1.777 4-4 4s-4-1.777-4-4s1.777-4 4-4z" fill="currentColor"></path></svg><!----></div></div></div><!----><div class="flex flex-wrap items-center my-8 max-w-60ch mx-auto items-stretch" data-v-4c8b317c data-v-a5be0f1c><a class="link" href="/yantra/pramahamsa/" data-v-a5be0f1c><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1.2em" height="1.2em" preserveaspectratio="xMidYMid meet" viewbox="0 0 32 32" style="vertical-align:middle;" class="mr-1" data-v-a5be0f1c><path d="M14 26l1.41-1.41L7.83 17H28v-2H7.83l7.58-7.59L14 6L4 16l10 10z" fill="currentColor"></path></svg><span data-v-a5be0f1c>Парамахамса</span></a><a class="link" href="/yantra/" data-v-a5be0f1c><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1.2em" height="1.2em" preserveaspectratio="xMidYMid meet" viewbox="0 0 32 32" style="vertical-align:middle;" class="mr-1" data-v-a5be0f1c><path d="M16 4L6 14l1.41 1.41L15 7.83V28h2V7.83l7.59 7.58L26 14L16 4z" fill="currentColor"></path></svg><span data-v-a5be0f1c>Янтры</span></a><a c
